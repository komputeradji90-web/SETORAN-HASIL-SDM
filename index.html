<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>COUGAN FAMILY - SETORAN</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

h1 { color: gold; }

input, select, button {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

button {
  background: gold;
  cursor: pointer;
}

table {
  margin: auto;
  width: 95%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid white;
  padding: 10px;
}

th {
  background: #222;
}

.hapus {
  background: red;
  color: white;
}

.total-box {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>COUGAN FAMILY</h1>
<h3>DATA SETORAN</h3>

<input type="text" id="nama" placeholder="Nama Member">

<select id="jenis">
  <option value="Daging">Daging</option>
  <option value="Oli">Oli</option>
  <option value="Wortel">Wortel</option>
  <option value="Kentang">Kentang</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah">
<button onclick="tambahData()">Tambah</button>

<br><br>

<table id="tabel">
<tr>
<th>Nama</th>
<th>Jenis</th>
<th>Jumlah</th>
<th>Aksi</th>
</tr>
</table>

<div class="total-box" id="total"></div>

<script>
let data = JSON.parse(localStorage.getItem("setoran")) || [];

function tampilkanData() {
  let table = document.getElementById("tabel");
  table.innerHTML = `
  <tr>
    <th>Nama</th>
    <th>Jenis</th>
    <th>Jumlah</th>
    <th>Aksi</th>
  </tr>
  `;

  let total = {
    Daging: 0,
    Oli: 0,
    Wortel: 0,
    Kentang: 0
  };

  data.forEach((item, index) => {
    let row = table.insertRow();
    row.insertCell(0).innerHTML = item.nama;
    row.insertCell(1).innerHTML = item.jenis;
    row.insertCell(2).innerHTML = item.jumlah;
    row.insertCell(3).innerHTML =
      `<button class="hapus" onclick="hapusData(${index})">Hapus</button>`;

    total[item.jenis] += Number(item.jumlah);
  });

  document.getElementById("total").innerHTML = `
    <b>Total:</b><br>
    Daging: ${total.Daging} | 
    Oli: ${total.Oli} | 
    Wortel: ${total.Wortel} | 
    Kentang: ${total.Kentang}
  `;
}

function tambahData() {
  let nama = document.getElementById("nama").value;
  let jenis = document.getElementById("jenis").value;
  let jumlah = document.getElementById("jumlah").value;

  if (!nama || !jumlah) {
    alert("Isi semua data!");
    return;
  }

  data.push({ nama, jenis, jumlah });
  localStorage.setItem("setoran", JSON.stringify(data));

  tampilkanData();

  document.getElementById("nama").value = "";
  document.getElementById("jumlah").value = "";
}

function hapusData(index) {
  data.splice(index, 1);
  localStorage.setItem("setoran", JSON.stringify(data));
  tampilkanData();
}

tampilkanData();
</script>

</body>
</html>
