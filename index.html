<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>COUGAN FAMILY - SETORAN</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

h1 {
  color: red;
  margin-top: 20px;
  text-shadow: 0 0 10px red;
}

.container {
  background: #111;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  border: 1px solid red;
}

input, select, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

input, select {
  background: #222;
  color: white;
  border: 1px solid red;
}

button {
  background: red;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: white;
  color: red;
}

table {
  margin: auto;
  width: 95%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  border: 1px solid red;
  padding: 10px;
}

th {
  background: #1a1a1a;
  color: white;
}

.hapus {
  background: darkred;
}

.hapus:hover {
  background: white;
  color: red;
}

.total-box {
  margin-top: 20px;
  font-size: 18px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid red;
}
</style>
</head>

<body>

<h1>⚔️ COUGAN FAMILY ⚔️</h1>

<div class="container">

<h3>INPUT SETORAN</h3>

<input type="text" id="nama" placeholder="Nama Member">

<input type="date" id="tanggal">

<select id="jenis">
  <option value="Daging">🥩 Daging</option>
  <option value="Oli">🛢️ Oli</option>
  <option value="Wortel">🥕 Wortel</option>
  <option value="Kentang">🥔 Kentang</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah">
<button onclick="tambahData()">Tambah</button>

</div>

<div class="container">

<h3>DATA SETORAN</h3>

<table id="tabel">
<tr>
<th>Nama</th>
<th>Tanggal</th>
<th>Jenis</th>
<th>Jumlah</th>
<th>Aksi</th>
</tr>
</table>

<div class="total-box" id="total"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("setoran")) || [];

function tampilkanData() {
  let table = document.getElementById("tabel");
  table.innerHTML = `
  <tr>
    <th>Nama</th>
    <th>Tanggal</th>
    <th>Jenis</th>
    <th>Jumlah</th>
    <th>Aksi</th>
  </tr>
  `;

  let total = {
    Daging: 0,
    Oli: 0,
    Wortel: 0,
    Kentang: 0
  };

  data.forEach((item, index) => {
    let row = table.insertRow();
    row.insertCell(0).innerHTML = item.nama;
    row.insertCell(1).innerHTML = item.tanggal;
    row.insertCell(2).innerHTML = item.jenis;
    row.insertCell(3).innerHTML = item.jumlah;
    row.insertCell(4).innerHTML =
      `<button class="hapus" onclick="hapusData(${index})">Hapus</button>`;

    total[item.jenis] += Number(item.jumlah);
  });

  document.getElementById("total").innerHTML = `
    <b>Total Setoran:</b><br>
    🥩 Daging: ${total.Daging} | 
    🛢️ Oli: ${total.Oli} | 
    🥕 Wortel: ${total.Wortel} | 
    🥔 Kentang: ${total.Kentang}
  `;
}

function tambahData() {
  let nama = document.getElementById("nama").value;
  let tanggal = document.getElementById("tanggal").value;
  let jenis = document.getElementById("jenis").value;
  let jumlah = document.getElementById("jumlah").value;

  if (!nama || !tanggal || !jumlah) {
    alert("Isi semua data!");
    return;
  }

  data.push({ nama, tanggal, jenis, jumlah });
  localStorage.setItem("setoran", JSON.stringify(data));

  tampilkanData();

  document.getElementById("nama").value = "";
  document.getElementById("tanggal").value = "";
  document.getElementById("jumlah").value = "";
}

function hapusData(index) {
  data.splice(index, 1);
  localStorage.setItem("setoran", JSON.stringify(data));
  tampilkanData();
}

tampilkanData();
</script>

</body>
</html>
